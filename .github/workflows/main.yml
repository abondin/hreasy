name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '23 2 * * 1'

permissions:
  contents: read

jobs:
  build-platform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Platform
        run: mvn -B package --file platform/pom.xml

      - name: Build Telegram Bot
        run: mvn -B package --file telegram/pom.xml

      - name: Publish Test Report
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      - name: Build and push docker platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}
          GITHUB_NAME: ${{ secrets.GITHUBNAME }}
        run: >
          mvn -B jib:build
          -Dimage='docker.io/abondin/hreasyplatform'
          -Djib.to.auth.username=${GITHUB_NAME}
          -Djib.to.auth.password=${GITHUB_TOKEN}
          --file platform/pom.xml

      - name: Build and push docker telegram bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}
          GITHUB_NAME: ${{ secrets.GITHUBNAME }}
        run: >
          mvn -B jib:build
          -Dimage='docker.io/abondin/hreasytelegram'
          -Djib.to.auth.username=${GITHUB_NAME}
          -Djib.to.auth.password=${GITHUB_TOKEN}
          --file telegram/pom.xml

  check-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  build-web:
    runs-on: ubuntu-latest
    needs: check-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/abondin/hreasyweb
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.GITHUBNAME }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 25
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build Java sources for CodeQL
        if: matrix.language == 'java'
        run: |
          mvn -B -DskipTests package --file platform/pom.xml
          mvn -B -DskipTests package --file telegram/pom.xml

      - name: Set up Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies for CodeQL
        if: matrix.language == 'javascript-typescript'
        working-directory: web
        run: npm ci

      - name: Analyze
        uses: github/codeql-action/analyze@v4