name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-platform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build Platform
        run: mvn -B package --file platform/pom.xml

      - name: Build Telegram Bot
        run: mvn -B package --file telegram/pom.xml

      - name: Publish Test Report
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"

      - name: Build and push docker platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}
          GITHUB_NAME: ${{ secrets.GITHUBNAME }}
        run: >
          mvn -B jib:build
          -Dimage='docker.io/abondin/hreasyplatform'
          -Djib.to.auth.username=${GITHUB_NAME}
          -Djib.to.auth.password=${GITHUB_TOKEN}
          --file platform/pom.xml

      - name: Build and push docker telegram bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}
          GITHUB_NAME: ${{ secrets.GITHUBNAME }}
        run: >
          mvn -B jib:build
          -Dimage='docker.io/abondin/hreasytelegram'
          -Djib.to.auth.username=${GITHUB_NAME}
          -Djib.to.auth.password=${GITHUB_TOKEN}
          --file telegram/pom.xml

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/abondin/hreasyweb
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.GITHUBNAME }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
