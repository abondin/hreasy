server:
  port: 8083

info:
  app:
    name: 'HR Easy Notify MS'
    description: 'HR Easy notification delivery service'
    version: '1.0.0-SNAPSHOT'
    site: https://github.com/abondin/hreasy

hreasy:
  db:
    host:
    port: 5432
    database: master
    username:
    password:
    flyway-commands: migrate
  notifications:
    http-token:
    worker:
      enabled: true
      fixed-delay: 10s
      batch-size: 20
    working-hours:
      timezone: Europe/Moscow
      start: "09:00"
      end: "18:00"
      workdays: MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY
    channels:
      yandex-messenger:
        enabled: false
        mode: business-hours-immediate
        max-attempts: 5
        base-url: https://botapi.messenger.yandex.net/bot/v1
        oauth-token:
      email:
        enabled: false
        mode: daily-digest
        max-attempts: 3
        digest-time: "18:30"

spring:
  r2dbc:
    url: r2dbc:postgresql://${hreasy.db.host}:${hreasy.db.port}/${hreasy.db.database}?schema=notify_ms
    username: ${hreasy.db.username}
    password: ${hreasy.db.password}
  flyway:
    url: jdbc:postgresql://${hreasy.db.host}:${hreasy.db.port}/${hreasy.db.database}
    user: ${hreasy.db.username}
    password: ${hreasy.db.password}
    enabled: false
    baseline-version: 0
    baseline-on-migrate: true
    schemas: notify_ms

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus,loggers
  endpoint:
    prometheus:
      access: read_only
    metrics:
      access: read_only
    loggers:
      access: read_only

logging:
  level:
    ru:
      abondin: INFO
